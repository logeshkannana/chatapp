name: chatapp
description: WhatsApp-like Chat App with Supabase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.0

  # Media - use stable versions
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  mime: ^1.0.5
  timeago: ^3.6.0
  url_launcher: ^6.2.0

  # State
  provider: ^6.1.1

  # Network
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true